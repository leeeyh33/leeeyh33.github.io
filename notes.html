<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>cat3lee Notes</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="notes-page">
    <header class="notes-header">
      <div class="notes-brand">
        <div class="notes-brand-mark" aria-hidden="true">🐱</div>
        <span class="notes-brand-name">catnose</span>
      </div>

      <div class="notes-header-actions" aria-hidden="true">
        <button class="notes-icon-button" type="button">📋</button>
        <button class="notes-icon-button" type="button">⌕</button>
      </div>
    </header>

    <section class="notes-tabs" aria-label="Notes categories">
      <button class="notes-tab active" type="button">すべて</button>
      <button class="notes-tab" type="button">日記</button>
      <button class="notes-tab" type="button">駄文</button>
      <button class="notes-tab" type="button">運営メモ</button>
    </section>

    <section class="notes-grid" aria-labelledby="notes-page-title">
      <h1 class="sr-only" id="notes-page-title">Notes</h1>

      <article class="note-card">
        <div class="note-card-preview">
          <div class="note-paper">
            <img src="cat.png" alt="" class="note-paper-image">
          </div>
        </div>
        <h2 class="note-card-title">春休みの滋賀旅行</h2>
        <p class="note-card-meta">2026/4/9に公開</p>
      </article>

      <article class="note-card">
        <div class="note-card-preview">
          <div class="note-paper note-paper-text"></div>
        </div>
        <h2 class="note-card-title">娘、保育園卒業</h2>
        <p class="note-card-meta">2026/3/23に公開</p>
      </article>

      <article class="note-card">
        <div class="note-card-preview">
          <div class="note-paper note-paper-thin"></div>
        </div>
        <h2 class="note-card-title">2026年03月14日（土）</h2>
        <p class="note-card-meta">2026/3/14に公開</p>
      </article>

      <article class="note-card">
        <div class="note-card-preview">
          <div class="note-paper">
            <img src="cat.png" alt="" class="note-paper-image">
          </div>
        </div>
        <h2 class="note-card-title">2026年02月21日（土）</h2>
        <p class="note-card-meta">2026/2/21に公開</p>
      </article>

      <article class="note-card">
        <div class="note-card-preview">
          <div class="note-paper note-paper-text"></div>
        </div>
        <h2 class="note-card-title">人間の記憶って素敵</h2>
        <p class="note-card-meta">2026/2/18に公開</p>
      </article>

      <article class="note-card">
        <div class="note-card-preview">
          <div class="note-paper">
            <img src="cat.png" alt="" class="note-paper-image">
          </div>
        </div>
        <h2 class="note-card-title">USJ行ってきた</h2>
        <p class="note-card-meta">2026/2/1に公開</p>
      </article>
    </section>
  </main>

  <div
    class="pill-menu"
    aria-expanded="false"
    aria-label="Site menu"
  >
    <button
      class="pill-menu-header"
      type="button"
      aria-expanded="false"
      aria-controls="pill-menu-content"
    >
      <span class="pill-menu-label">menu 🐱</span>
    </button>

    <div
      id="pill-menu-content"
      class="pill-menu-content"
    >
      <nav class="pill-menu-list" aria-label="Main navigation">
        <a href="index.html" class="pill-menu-item">🏠 home</a>
        <a href="labs.html" class="pill-menu-item">👾 lab</a>
        <a href="notes.html" class="pill-menu-item">🍃 notes</a>
        <a href="index.html#contact" class="pill-menu-item">🤠 contact me</a>
      </nav>
    </div>
  </div>

  <div
    class="language-dial"
    aria-expanded="false"
    aria-label="Language switcher"
  >
    <button
      class="language-dial-trigger"
      type="button"
      aria-expanded="false"
      aria-controls="language-dial-options"
      aria-label="Open language options"
    >
      <span class="language-dial-plus" aria-hidden="true">+</span>
    </button>

    <div
      id="language-dial-options"
      class="language-dial-options"
    >
      <button class="language-option" type="button">EN</button>
      <button class="language-option" type="button">中</button>
      <button class="language-option" type="button">JP</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
