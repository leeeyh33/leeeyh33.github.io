<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="labPage.title">cat3lee 實驗室</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/lab.css">
</head>
<body>
  <main class="page-main">
    <section class="page-hero" aria-labelledby="lab-page-title">
      <p class="page-eyebrow" data-i18n="labPage.eyebrow">cat3lee</p>
      <h1 class="page-title" id="lab-page-title" data-i18n="labPage.heading">實驗室</h1>
      <p class="page-subtitle" data-i18n="labPage.subtitle">專門放實驗、原型和各種建造中的作品。</p>
    </section>
  </main>

  <footer class="site-footer" id="contact" data-i18n-aria-label="footer.navigation" aria-label="頁尾導航">
    <div class="footer-inner">
      <a href="index.html" class="footer-link" data-i18n="nav.home">首頁</a>
      <a href="lab.html" class="footer-link" data-i18n="nav.lab">實驗室</a>
      <a href="#contact" class="footer-link" data-i18n="nav.contact">聯絡我</a>
    </div>
  </footer>

  <div
    class="pill-menu"
    aria-expanded="false"
    data-i18n-aria-label="menu.siteMenu"
    aria-label="站點選單"
  >
    <button
      class="pill-menu-header"
      type="button"
      aria-expanded="false"
      aria-controls="pill-menu-content"
    >
      <span class="pill-menu-label" data-i18n="menu.label">選單 🐱</span>
    </button>

    <div
      id="pill-menu-content"
      class="pill-menu-content"
    >
      <nav class="pill-menu-list" data-i18n-aria-label="menu.mainNavigation" aria-label="主導航">
        <a href="index.html" class="pill-menu-item"><span aria-hidden="true">🏠</span> <span data-i18n="nav.home">首頁</span></a>
        <a href="lab.html" class="pill-menu-item"><span aria-hidden="true">👾</span> <span data-i18n="nav.lab">實驗室</span></a>
        <a href="notes.html" class="pill-menu-item"><span aria-hidden="true">🍃</span> <span data-i18n="nav.notes">筆記</span></a>
        <a href="#contact" class="pill-menu-item"><span aria-hidden="true">🤠</span> <span data-i18n="nav.contact">聯絡我</span></a>
      </nav>
    </div>
  </div>

  <div
    class="language-dial"
    aria-expanded="false"
    data-i18n-aria-label="language.switcher"
    aria-label="語言切換"
  >
    <button
      class="language-dial-trigger"
      type="button"
      aria-expanded="false"
      aria-controls="language-dial-options"
      data-i18n-aria-label="language.openOptions"
      aria-label="打開語言選項"
    >
      <span class="language-dial-plus" aria-hidden="true">+</span>
    </button>

    <div
      id="language-dial-options"
      class="language-dial-options"
    >
      <button class="language-option" type="button" data-lang="en" data-i18n="language.options.en">EN</button>
      <button class="language-option" type="button" data-lang="zh" data-i18n="language.options.zh">中</button>
      <button class="language-option" type="button" data-lang="ja" data-i18n="language.options.jp">JP</button>
    </div>
  </div>

  <script src="js/i18n.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
