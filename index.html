<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>cat3lee</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- 頁面主內容 -->
  <main class="main-content">
    <!-- logo 區塊 -->
    <section class="intro-section" id="home" aria-label="Introduction">
      <div class="logo" aria-hidden="true">🐱</div>

      <!-- 自我介紹文字 -->
      <div class="intro-text">
        <p>I'm cat3lee...</p>
        <p>I make web apps...</p>
        <p>I live a simple life...</p>
      </div>
    </section>

    <!-- Lab 區塊 -->
    <section class="content-section" id="lab" aria-labelledby="lab-title">
      <h2 class="section-title" id="lab-title">Lab</h2>
      <div class="section-placeholder">Project experiments and builds will go here.</div>
    </section>

    <!-- Notes 區塊 -->
    <section class="content-section" id="notes" aria-labelledby="notes-title">
      <h2 class="section-title" id="notes-title">Notes</h2>
      <div class="section-placeholder">Writing, thoughts, and small updates will go here.</div>
    </section>
  </main>

  <!-- 主頁面 footer -->
  <footer class="site-footer" id="contact" aria-label="Footer navigation">
    <div class="footer-inner">
      <a href="index.html" class="footer-link">Home</a>
      <a href="notes.html" class="footer-link">Notes</a>
      <a href="#contact" class="footer-link">Follow me</a>
    </div>
  </footer>

  <!-- 固定在底部中央的膠囊 menu -->
  <div
    class="pill-menu"
    aria-expanded="false"
    aria-label="Site menu"
  >
    <!-- 永遠看得到的 header -->
    <button
      class="pill-menu-header"
      type="button"
      aria-expanded="false"
      aria-controls="pill-menu-content"
    >
      <span class="pill-menu-label">menu 🐱</span>
    </button>

    <!-- 展開後才看得到的內容 -->
    <div
      id="pill-menu-content"
      class="pill-menu-content"
    >
      <nav class="pill-menu-list" aria-label="Main navigation">
        <a href="#home" class="pill-menu-item">🏠 home</a>
        <a href="labs.html" class="pill-menu-item">👾 lab</a>
        <a href="notes.html" class="pill-menu-item">🍃 notes</a>
        <a href="#contact" class="pill-menu-item">🤠 contact me</a>
      </nav>
    </div>
  </div>

  <!-- 右側語言切換圓盤 -->
  <div
    class="language-dial"
    aria-expanded="false"
    aria-label="Language switcher"
  >
    <button
      class="language-dial-trigger"
      type="button"
      aria-expanded="false"
      aria-controls="language-dial-options"
      aria-label="Open language options"
    >
      <span class="language-dial-plus" aria-hidden="true">+</span>
    </button>

    <div
      id="language-dial-options"
      class="language-dial-options"
    >
      <button class="language-option" type="button">EN</button>
      <button class="language-option" type="button">中</button>
      <button class="language-option" type="button">JP</button>
    </div>
  </div>

  <!-- JavaScript 放在 body 最後 -->
  <script src="script.js"></script>
</body>
</html>
